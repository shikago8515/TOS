name: tos-check

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:
    branches:
      - main

permissions:
  contents: write
  code: write
  releases: write

jobs:
  check:
    name: Full repository checks
    runs-on: euleros-2.10.1
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    steps:
      - name: Checkout source
        env:
          GITEA_REF: ${{ gitea.ref }}
          GITEA_SHA: ${{ gitea.sha }}
          GITEA_ACTOR: ${{ gitea.actor }}
          GITEA_SERVER_URL: ${{ gitea.server_url }}
          GITEA_REPOSITORY: ${{ gitea.repository }}
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          rm -rf repo_workspace
          repo_url="${GITEA_SERVER_URL%/}/${GITEA_REPOSITORY}.git"
          if [ -n "$GITEA_TOKEN" ]; then
            case "$repo_url" in
              http://*) auth_repo_url="http://${GITEA_ACTOR:-tos-release-bot}:${GITEA_TOKEN}@${repo_url#http://}" ;;
              https://*) auth_repo_url="https://${GITEA_ACTOR:-tos-release-bot}:${GITEA_TOKEN}@${repo_url#https://}" ;;
              *) auth_repo_url="$repo_url" ;;
            esac
          else
            auth_repo_url="$repo_url"
          fi
          git clone --no-checkout --depth 1 "$auth_repo_url" repo_workspace
          cd repo_workspace
          git remote set-url origin "$repo_url"
          if [ -n "$GITEA_REF" ]; then
            git fetch --depth 1 "$auth_repo_url" "$GITEA_REF" || true
          fi
          if [ -n "$GITEA_SHA" ]; then
            git checkout --detach "$GITEA_SHA"
          else
            git checkout main
          fi

      - name: Install Node.js and dependencies
        run: |
          cd repo_workspace
          if command -v apk >/dev/null 2>&1; then
            apk add --no-cache nodejs npm python3 py3-pip py3-virtualenv
            python3 -m virtualenv .venv
          elif command -v apt-get >/dev/null 2>&1; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y nodejs npm python3 python3-pip python3-venv
            python3 -m venv .venv
          else
            python3 -m venv .venv
          fi
          export PYTHON="$PWD/.venv/bin/python"
          export PATH="$PWD/.venv/bin:$PATH"
          node --version
          npm --version
          "$PYTHON" --version
          "$PYTHON" -m pip --version
          npm run ci:install

      - name: Run full repository checks
        run: |
          cd repo_workspace
          export PYTHON="$PWD/.venv/bin/python"
          export PATH="$PWD/.venv/bin:$PATH"
          npm run check

      - name: Semantic release
        env:
          GITEA_REF: ${{ gitea.ref }}
          GITEA_SHA: ${{ gitea.sha }}
          GITEA_ACTOR: ${{ gitea.actor }}
          GITEA_SERVER_URL: ${{ gitea.server_url }}
          GITEA_REPOSITORY: ${{ gitea.repository }}
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          TOS_GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          cd repo_workspace
          if [ "$GITEA_REF" != "refs/heads/main" ] || [ -z "$GITEA_TOKEN" ]; then
            echo "Skip semantic-release: not a main push or GITEA_TOKEN is missing."
            exit 0
          fi
          if git log -1 --pretty=%s | grep -q '^chore(release):'; then
            echo "Skip semantic-release for release commit."
            exit 0
          fi
          git config user.name "tos-release-bot"
          git config user.email "tos-release-bot@users.noreply.gitea.local"
          repo_url="${GITEA_SERVER_URL%/}/${GITEA_REPOSITORY}.git"
          case "$repo_url" in
            http://*) auth_repo_url="http://${GITEA_ACTOR:-tos-release-bot}:${GITEA_TOKEN}@${repo_url#http://}" ;;
            https://*) auth_repo_url="https://${GITEA_ACTOR:-tos-release-bot}:${GITEA_TOKEN}@${repo_url#https://}" ;;
            *) auth_repo_url="$repo_url" ;;
          esac
          git remote set-url origin "$auth_repo_url"
          git checkout -B main "$GITEA_SHA"
          git fetch origin main --tags --prune
          if ! git ls-remote --exit-code --heads origin stable >/dev/null 2>&1; then
            git push origin HEAD:stable
          fi
          git fetch origin stable --prune
          npm run release -- --no-ci
