name: tos-check

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:
    branches:
      - main

jobs:
  check:
    name: Full repository checks
    runs-on: euleros-2.10.1
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      PYTHON: python3
    steps:
      - name: Checkout source
        env:
          GITCODE_REF: ${{ gitcode.ref }}
          GITCODE_SHA: ${{ gitcode.sha }}
        run: |
          rm -rf repo_workspace
          git clone --no-checkout --depth 1 https://gitcode.com/shikago8515/TOS.git repo_workspace
          cd repo_workspace
          if [ -n "$GITCODE_REF" ]; then
            git fetch --depth 1 origin "$GITCODE_REF" || true
          fi
          if [ -n "$GITCODE_SHA" ]; then
            git checkout --detach "$GITCODE_SHA"
          else
            git checkout main
          fi

      - name: Use Node.js
        uses: setup-node@0.0.1
        with:
          node-version: '22.11.0'

      - name: Show runtime versions
        run: |
          cd repo_workspace
          node --version
          npm --version
          python3 --version

      - name: Install dependencies
        run: |
          cd repo_workspace
          npm run ci:install

      - name: Run full repository checks
        run: |
          cd repo_workspace
          PYTHON=python3 npm run check
